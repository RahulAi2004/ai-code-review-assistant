# nginx site for the AI Code Review Assistant.
# Serves the React build as static files and proxies /api (+ /docs) to FastAPI.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # React production build
    root /opt/ai-code-review/client/dist;
    index index.html;

    client_max_body_size 4m;

    # API → FastAPI (uvicorn on localhost:5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Swagger API docs (optional, handy for the demo)
    location = /docs        { proxy_pass http://127.0.0.1:5000; }
    location = /openapi.json { proxy_pass http://127.0.0.1:5000; }

    # SPA fallback — serve index.html for any other route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
